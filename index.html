<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UnionMas | Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Manrope:wght@800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #161616;
            --accent: #d4af37; /* Золотистый акцент */
            --text: #ffffff;
            --border: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; outline: none; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; }

        /* PIN */
        #pin-screen { position: fixed; inset: 0; z-index: 10000; background: var(--bg); display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .pin-dot { width: 12px; height: 12px; border: 1px solid var(--accent); border-radius: 50%; margin: 0 10px; transition: 0.3s; }
        .pin-dot.active { background: var(--accent); box-shadow: 0 0 15px var(--accent); }
        .numpad { display: grid; grid-template-columns: repeat(3, 80px); gap: 20px; margin-top: 50px; }
        .num-btn { width: 80px; height: 80px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; border-radius: 50%; background: var(--surface); cursor: pointer; }

        /* MAIN APP */
        #main-app { display: none; flex-direction: column; padding: 20px; height: 100vh; max-width: 500px; margin: 0 auto; }
        
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; }
        .logo { font-family: 'Manrope', sans-serif; font-weight: 800; letter-spacing: -1px; font-size: 1.2rem; }

        /* WALLET CARD */
        .wallet-carousel { display: flex; gap: 15px; overflow-x: auto; scroll-snap-type: x mandatory; padding-bottom: 20px; scrollbar-width: none; }
        .wallet-carousel::-webkit-scrollbar { display: none; }
        
        .card { 
            min-width: 85%; background: var(--surface); padding: 25px; border-radius: 30px; 
            scroll-snap-align: center; border: 1px solid var(--border);
            position: relative; overflow: hidden;
        }
        .card::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(212,175,55,0.05) 0%, transparent 70%); }
        
        .card-label { font-size: 0.7rem; opacity: 0.5; text-transform: uppercase; letter-spacing: 1px; }
        .card-balance { font-family: 'Manrope', sans-serif; font-size: 2.2rem; font-weight: 800; margin: 10px 0; }

        /* ACTIONS */
        .grid-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 20px 0; }
        .menu-item { background: var(--surface); padding: 20px; border-radius: 20px; border: 1px solid var(--border); text-align: center; cursor: pointer; transition: 0.2s; }
        .menu-item:active { transform: scale(0.95); background: #1f1f1f; }
        .menu-item span { display: block; font-size: 0.75rem; font-weight: 600; margin-top: 5px; color: var(--accent); }

        /* CONTACTS */
        .section-title { font-size: 0.8rem; font-weight: 700; opacity: 0.3; margin: 20px 0 15px; text-transform: uppercase; }
        .contact-list { display: flex; gap: 15px; overflow-x: auto; scrollbar-width: none; }
        .contact-item { min-width: 70px; text-align: center; }
        .avatar { width: 60px; height: 60px; border-radius: 50%; background: var(--surface); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-weight: 700; margin-bottom: 8px; font-size: 1.2rem; color: var(--accent); }

        /* MODALS (DRAWER STYLE) */
        .modal { 
            display: none; position: fixed; inset: 0; z-index: 10001; 
            background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            align-items: flex-end;
        }
        .modal-content { 
            width: 100%; background: #111; border-radius: 35px 35px 0 0; padding: 40px 25px;
            transform: translateY(100%); animation: slideUp 0.4s ease forwards;
        }
        @keyframes slideUp { to { transform: translateY(0); } }

        .input-box { width: 100%; background: var(--surface); border: 1px solid var(--border); padding: 20px; border-radius: 15px; color: white; margin-bottom: 15px; font-size: 1rem; }
        .btn-action { width: 100%; background: var(--accent); color: black; padding: 20px; border-radius: 15px; font-weight: 800; border: none; margin-top: 10px; }
        
        .history-row { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid var(--border); }
    </style>
</head>
<body>

    <div id="pin-screen">
        <div class="logo" style="margin-bottom: 40px; font-size: 1.8rem;">UNIONMAS</div>
        <div style="display: flex; margin-bottom: 40px;">
            <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
        </div>
        <div class="numpad">
            <div class="num-btn" onclick="press(1)">1</div><div class="num-btn" onclick="press(2)">2</div><div class="num-btn" onclick="press(3)">3</div>
            <div class="num-btn" onclick="press(4)">4</div><div class="num-btn" onclick="press(5)">5</div><div class="num-btn" onclick="press(6)">6</div>
            <div class="num-btn" onclick="press(7)">7</div><div class="num-btn" onclick="press(8)">8</div><div class="num-btn" onclick="press(9)">9</div>
            <div></div><div class="num-btn" onclick="press(0)">0</div><div class="num-btn" onclick="clr()">✕</div>
        </div>
    </div>

    <div id="main-app">
        <div class="header">
            <div class="logo">UNIONMAS.</div>
            <div onclick="openModal('settings-modal')" style="opacity: 0.5;">SETTINGS</div>
        </div>

        <div class="wallet-carousel">
            <div class="card">
                <div class="card-label">USD Account</div>
                <div class="card-balance" id="bal-usd">50,000.00 $</div>
                <div class="card-label">Active Wallet</div>
            </div>
            <div class="card">
                <div class="card-label">KZT Account</div>
                <div class="card-balance" id="bal-kzt">50,000.00 ₸</div>
                <div class="card-label">Savings Wallet</div>
            </div>
        </div>

        <div class="grid-menu">
            <div class="menu-item" onclick="actionFlow('topup')"><span>DEPOSIT</span></div>
            <div class="menu-item" onclick="openModal('history-modal')"><span>HISTORY</span></div>
            <div class="menu-item" onclick="openModal('conv-modal')"><span>EXCHANGE</span></div>
            <div class="menu-item" onclick="openModal('settings-modal')"><span>PROFILE</span></div>
        </div>

        <div class="section-title">Quick Transfer</div>
        <div class="contact-list" id="contacts-list"></div>
    </div>

    <div id="settings-modal" class="modal" onclick="if(event.target==this) closeModals()">
        <div class="modal-content">
            <h2 id="set-title" style="margin-bottom: 20px;">Settings</h2>
            <div style="display: flex; gap: 10px; margin-bottom: 30px;">
                <button class="menu-item" style="flex: 1;" onclick="setLang('RUS')">РУССКИЙ</button>
                <button class="menu-item" style="flex: 1;" onclick="setLang('ENG')">ENGLISH</button>
            </div>
            <button class="btn-action" onclick="closeModals()">DONE</button>
        </div>
    </div>

    <div id="history-modal" class="modal" onclick="if(event.target==this) closeModals()">
        <div class="modal-content" style="height: 70vh; overflow-y: auto;">
            <h2 id="his-title" style="margin-bottom: 20px;">Transactions</h2>
            <div id="history-list"></div>
        </div>
    </div>

    <div id="conv-modal" class="modal" onclick="if(event.target==this) closeModals()">
        <div class="modal-content">
            <h2 id="conv-title" style="margin-bottom: 20px;">Exchange Rate</h2>
            <div id="conv-list"></div>
            <button class="btn-action" onclick="closeModals()">CLOSE</button>
        </div>
    </div>

    <div id="prompt-modal" class="modal">
        <div class="modal-content">
            <h2 id="prompt-title">Transfer</h2>
            <input type="text" id="in-name" class="input-box" placeholder="Name">
            <input type="number" id="in-amt" class="input-box" placeholder="Amount" inputmode="decimal">
            <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                <button class="menu-item" style="flex: 1;" onclick="setPromptCurr('$')">$</button>
                <button class="menu-item" style="flex: 1;" onclick="setPromptCurr('₸')">₸</button>
            </div>
            <button id="btn-ok" class="btn-action">CONFIRM</button>
            <button onclick="closeModals()" style="width: 100%; background: none; border: none; color: white; margin-top: 15px; opacity: 0.3;">CANCEL</button>
        </div>
    </div>

    <script>
        let pin = "";
        // Стартовый баланс по твоему запросу
        let balances = JSON.parse(localStorage.getItem('um_balances')) || { '$': 50000, '₸': 50000 };
        let history = JSON.parse(localStorage.getItem('um_his')) || [];
        let contacts = JSON.parse(localStorage.getItem('um_con')) || [{n:"Maria"}, {n:"Ivan"}, {n:"Alex"}];
        let lang = localStorage.getItem('um_lang') || 'RUS';
        let activePromptCurr = '$';

        const t = {
            RUS: { top:"ПОПОЛНИТЬ", conv:"КУРСЫ", his:"ИСТОРИЯ", set:"НАСТРОЙКИ", ok:"ГОТОВО", name:"Имя", amt:"Сумма", low:"МАЛО СРЕДСТВ" },
            ENG: { top:"DEPOSIT", conv:"EXCHANGE", his:"HISTORY", set:"SETTINGS", ok:"CONFIRM", name:"Name", amt:"Amount", low:"LOW BALANCE" }
        };

        function press(n) {
            if(pin.length < 4) {
                pin += n; document.querySelectorAll('.pin-dot')[pin.length-1].classList.add('active');
                if(pin.length === 4) {
                    if(pin === "2807") { 
                        document.getElementById('pin-screen').style.display='none'; 
                        document.getElementById('main-app').style.display='flex'; 
                        render(); 
                    } else { setTimeout(clr, 300); }
                }
            }
        }
        function clr() { pin = ""; document.querySelectorAll('.pin-dot').forEach(d => d.classList.remove('active')); }

        function openModal(id) { 
            if(id === 'conv-modal') updateConv();
            if(id === 'history-modal') updateHistory();
            document.getElementById(id).style.display = 'flex'; 
        }
        function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }

        function setPromptCurr(c) { activePromptCurr = c; }

        function actionFlow(type, extraName = "") {
            const curT = t[lang];
            openModal('prompt-modal');
            const inN = document.getElementById('in-name');
            const inA = document.getElementById('in-amt');
            inN.value = extraName; inA.value = "";
            inN.style.display = extraName ? 'none' : 'block';

            document.getElementById('btn-ok').onclick = () => {
                const name = inN.value || extraName;
                const amt = parseFloat(inA.value);
                if(!amt) return;

                if(type === 'topup') {
                    balances[activePromptCurr] += amt;
                    history.unshift({n: (lang==='RUS'?'Ввод: ':'In: ')+name, a: amt, c: activePromptCurr, s: "+"});
                } else {
                    if(amt > balances[activePromptCurr]) return alert(curT.low);
                    balances[activePromptCurr] -= amt;
                    history.unshift({n: name, a: amt, c: activePromptCurr, s: "-"});
                }
                closeModals(); render();
            };
        }

        function updateConv() {
            // Реальный примерный курс
            const rate = 450; 
            document.getElementById('conv-list').innerHTML = `
                <div class="history-row"><span>1 USD</span><span style="color:var(--accent)">${rate} ₸</span></div>
                <div class="history-row"><span>Ваши $ в тенге</span><span style="color:var(--accent)">${(balances['$'] * rate).toLocaleString()} ₸</span></div>
            `;
        }

        function updateHistory() {
            document.getElementById('history-list').innerHTML = history.map(h => `
                <div class="history-row">
                    <div><p style="font-weight:700">${h.n}</p></div>
                    <span style="color:${h.s==='+'?'#00ff88':var(--accent)}">${h.s}${h.a.toLocaleString()} ${h.c}</span>
                </div>`).join('');
        }

        function setLang(l) { lang = l; localStorage.setItem('um_lang', l); render(); }

        function render() {
            const curT = t[lang];
            document.getElementById('bal-usd').innerText = balances['$'].toLocaleString() + ' $';
            document.getElementById('bal-kzt').innerText = balances['₸'].toLocaleString() + ' ₸';
            
            document.getElementById('contacts-list').innerHTML = contacts.map((c, i) => `
                <div class="contact-item" onclick="actionFlow('pay', '${c.n}')">
                    <div class="avatar">${c.n[0]}</div>
                    <p style="font-size:0.6rem; font-weight:700; opacity:0.6">${c.n}</p>
                </div>`).join('');

            localStorage.setItem('um_balances', JSON.stringify(balances));
            localStorage.setItem('um_his', JSON.stringify(history));
        }
    </script>
</body>
</html>
