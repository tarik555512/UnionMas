<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UnionMas Bank | Aero Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        /* Глобальные переменные стиля */
        :root {
            --glass: rgba(255, 255, 255, 0.08); /* Эффект стекла */
            --border: rgba(255, 255, 255, 0.15); /* Светящаяся граница */
            --accent: #00f2ff; /* Основной неоновый цвет */
            --bg: #050a18; /* Глубокий фон */
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; outline: none; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); color: white; overflow: hidden; height: 100vh; position: fixed; width: 100%; }

        /* Анимированный фон со сферами за стеклом */
        .bg-animate { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at center, #0f172a, #050a18); }
        .sphere { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.3; animation: float 25s infinite alternate ease-in-out; }
        @keyframes float { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(100px, 150px) scale(1.2); } }

        /* Базовый класс для стеклянных элементов (Glassmorphism) */
        .aero { 
            background: var(--glass); 
            backdrop-filter: blur(30px); 
            -webkit-backdrop-filter: blur(30px); 
            border: 1px solid var(--border); 
            border-radius: 24px; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --- ЭКРАН ПИН-КОДА (2807) --- */
        #pin-screen { position: fixed; inset: 0; z-index: 10000; background: var(--bg); display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .pin-dots { display: flex; gap: 20px; margin-bottom: 50px; }
        .pin-dot { width: 14px; height: 14px; border: 2px solid white; border-radius: 50%; transition: 0.3s; }
        .pin-dot.active { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 15px var(--accent); transform: scale(1.2); }
        .keypad { display: grid; grid-template-columns: repeat(3, 80px); gap: 20px; }
        .key { width: 80px; height: 80px; border-radius: 50%; border: 1px solid var(--border); background: var(--glass); display: flex; justify-content: center; align-items: center; font-size: 1.6rem; cursor: pointer; }
        .key:active { background: rgba(255,255,255,0.1); transform: scale(0.9); border-color: var(--accent); }

        /* --- ГЛАВНЫЙ ЭКРАН --- */
        #main-app { display: none; flex-direction: column; padding: 20px; max-width: 450px; margin: 0 auto; height: 100vh; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; margin-top: 10px; }
        .logo { font-weight: 800; font-size: 1.1rem; letter-spacing: -1px; }

        /* КАРТОЧКА БАЛАНСА */
        .main-card { padding: 35px 25px; margin: 20px 0; position: relative; }
        .main-card::before { content: ''; position: absolute; top:-50%; left:-50%; width:200%; height:200%; background: radial-gradient(circle, rgba(0,242,255,0.05) 0%, transparent 70%); }
        .bal-val { font-family: 'JetBrains Mono', monospace; font-size: 2.5rem; font-weight: 800; margin: 10px 0; letter-spacing: -2px; }

        /* КНОПКИ ДЕЙСТВИЙ */
        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px; }
        .btn { padding: 20px; text-align: center; cursor: pointer; font-weight: 800; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; }
        .btn.primary { background: var(--accent); color: #000; border: none; box-shadow: 0 4px 15px rgba(0, 242, 255, 0.3); }
        .btn:active { transform: scale(0.96); opacity: 0.9; }

        /* ИСТОРИЯ И КОНТАКТЫ */
        .section-header { font-size: 0.75rem; font-weight: 800; opacity: 0.3; margin: 20px 0 12px; text-transform: uppercase; letter-spacing: 1.5px; }
        .scroll-h { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .scroll-h::-webkit-scrollbar { display: none; }

        .pill { min-width: 90px; padding: 18px 10px; text-align: center; cursor: pointer; }
        .avatar { width: 50px; height: 50px; border-radius: 18px; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; font-weight: 700; background: rgba(255,255,255,0.03); border: 1px solid var(--border); color: var(--accent); }

        .his-list { flex: 1; overflow-y: auto; scrollbar-width: none; }
        .his-item { display: flex; justify-content: space-between; align-items: center; padding: 20px; margin-bottom: 12px; }

        /* --- МОДАЛЬНОЕ ОКНО --- */
        .modal { display: none; position: fixed; inset: 0; z-index: 2000; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); align-items: center; justify-content: center; padding: 20px; }
        .modal-box { width: 100%; max-width: 380px; padding: 30px; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* Улучшенный ввод суммы */
        .input-aero { width: 100%; background: #000; border: 1px solid var(--border); padding: 18px; border-radius: 15px; color: #fff; margin: 15px 0; text-align: center; font-size: 1.3rem; font-weight: 600; font-family: 'Montserrat'; }
        .input-aero:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(0,242,255,0.3); }
    </style>
</head>
<body>

    <div class="bg-animate">
        <div class="sphere" style="width: 300px; height: 300px; background: var(--accent); top: -50px; left: -50px;"></div>
        <div class="sphere" style="width: 400px; height: 400px; background: #7000ff; bottom: -100px; right: -50px; animation-delay: -5s;"></div>
    </div>

    <div id="pin-screen">
        <div class="logo" style="margin-bottom: 50px; font-size: 1.6rem;">UNIONMAS</div>
        <div class="pin-dots">
            <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
        </div>
        <div class="keypad">
            <div class="key" onclick="tap(1)">1</div><div class="key" onclick="tap(2)">2</div><div class="key" onclick="tap(3)">3</div>
            <div class="key" onclick="tap(4)">4</div><div class="key" onclick="tap(5)">5</div><div class="key" onclick="tap(6)">6</div>
            <div class="key" onclick="tap(7)">7</div><div class="key" onclick="tap(8)">8</div><div class="key" onclick="tap(9)">9</div>
            <div></div><div class="key" onclick="tap(0)">0</div><div class="key" onclick="clr()">✕</div>
        </div>
    </div>

    <div id="main-app">
        <div class="header">
            <div class="logo">UNIONMAS.</div>
            <div onclick="showModal('settings')" style="font-size:0.7rem; font-weight:800; opacity:0.4;">SETTINGS</div>
        </div>

        <div class="aero main-card">
            <p style="font-size:0.7rem; opacity:0.4; text-transform:uppercase; font-weight:800;">Общий баланс</p>
            <p class="bal-val" id="balance">0 ₽</p>
        </div>

        <div class="btn-row">
            <div class="aero btn primary" onclick="showModal('topup')">Пополнить</div>
            <div class="aero btn" onclick="showModal('send')">Перевести</div>
        </div>

        <p class="section-header">Переводы</p>
        <div class="scroll-h" id="contacts-list"></div>

        <p class="section-header">История операций</p>
        <div class="his-list" id="history"></div>
    </div>

    <div id="modal" class="modal">
        <div class="aero modal-box">
            <h3 id="m-title" style="text-align:center">Ввод</h3>
            <input type="number" id="m-input" class="input-aero" placeholder="0" inputmode="decimal">
            <button class="aero btn primary" style="width:100%" onclick="confirmAction()">Подтвердить</button>
            <button class="aero btn" style="width:100%; border:none; margin-top:10px; background:none; opacity:0.5" onclick="hideModal()">Отмена</button>
        </div>
    </div>

    <div id="modal-settings" class="modal">
        <div class="aero modal-box">
            <h3 style="text-align:center; margin-bottom:20px">Настройки</h3>
            <div class="aero btn" style="width:100%; margin-bottom:10px">Сменить ПИН-код</div>
            <div class="aero btn primary" style="width:100%" onclick="hideModal()">Закрыть</div>
        </div>
    </div>

    <script>
        let pin = "";
        let balance = parseFloat(localStorage.getItem('um_bal_v4')) || 0;
        let history = JSON.parse(localStorage.getItem('um_his_v4')) || [];
        let curMode = "";

        // ПИН-КОД (2807)
        function tap(n) {
            if(pin.length < 4) {
                pin += n;
                const dots = document.querySelectorAll('.pin-dot');
                dots[pin.length - 1].classList.add('active');
                if(pin.length === 4) {
                    if(pin === "2807") {
                        document.getElementById('pin-screen').style.display = 'none';
                        document.getElementById('main-app').style.display = 'flex';
                        render();
                    } else { setTimeout(clr, 300); }
                }
            }
        }
        function clr() {
            pin = "";
            document.querySelectorAll('.pin-dot').forEach(d => d.classList.remove('active'));
        }

        // УПРАВЛЕНИЕ СТЕКЛЯННЫМИ ОКНАМИ
        function showModal(mode, extra = "") {
            curMode = mode;
            if(mode === 'settings') {
                document.getElementById('modal-settings').style.display = 'flex';
                return;
            }
            if(mode === 'topup') document.getElementById('m-title').innerText = 'Пополнение (₽)';
            if(mode === 'send') document.getElementById('m-title').innerText = 'Перевод для ' + extra + ' (₽)';
            
            document.getElementById('modal').style.display = 'flex';
            document.getElementById('m-input').value = "";
            document.getElementById('m-input').focus();
        }
        function hideModal() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }

        function confirmAction() {
            const val = parseFloat(document.getElementById('m-input').value);
            if(!val || val <= 0) return;

            if(curMode === 'topup') {
                balance += val;
                history.unshift({t: 'Пополнение', a: '+' + val.toLocaleString() + ' ₽', c: var(--accent)});
            } else if(curMode === 'send') {
                if(val > balance) return alert('Недостаточно средств'); // Можно заменить на кастомный алерт
                balance -= val;
                history.unshift({t: 'Перевод', a: '-' + val.toLocaleString() + ' ₽', c: '#ff4d4d'});
            }
            hideModal(); render();
        }

        // ОТРИСОВКА (RENDER)
        function render() {
            document.getElementById('balance').innerText = balance.toLocaleString() + ' ₽';
            
            // Заглушка контактов
            const conts = ["Maria", "Alex", "Ivan", "Sergey"];
            document.getElementById('contacts-list').innerHTML = conts.map(c => `
                <div class="aero pill" onclick="showModal('send', '${c}')">
                    <div class="avatar">${c[0]}</div>
                    <p style="font-size:0.6rem; font-weight:700; opacity:0.6">${c}</p>
                </div>
            `).join('');

            // История
            document.getElementById('history').innerHTML = history.map(h => `
                <div class="aero his-item">
                    <span>${h.t}</span>
                    <span style="color:${h.c}; font-weight:800; font-family:'JetBrains Mono'">${h.a}</span>
                </div>
            `).join('') || '<p style="text-align:center; opacity:0.2; margin-top:20px">Операций нет</p>';
            
            // Сохранение
            localStorage.setItem('um_bal_v4', balance);
            localStorage.setItem('um_his_v4', JSON.stringify(history));
        }
    </script>
</body>
</html>
