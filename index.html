<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UnionMas | Ruble Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --card: #111111;
            --accent: #d4af37;
            --text: #ffffff;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Manrope', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; }

        /* ЭКРАН ВХОДА */
        #pin-screen { 
            position: fixed; inset: 0; z-index: 1000; background: var(--bg);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .pin-dots { display: flex; gap: 15px; margin-bottom: 40px; }
        .pin-dot { width: 12px; height: 12px; border: 2px solid var(--border); border-radius: 50%; transition: 0.2s; }
        .pin-dot.active { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 10px var(--accent); }

        .keypad { display: grid; grid-template-columns: repeat(3, 80px); gap: 20px; }
        .key { 
            width: 80px; height: 80px; border-radius: 50%; background: var(--card);
            display: flex; align-items: center; justify-content: center; font-size: 1.5rem;
            font-weight: 600; cursor: pointer; transition: 0.1s;
        }
        .key:active { transform: scale(0.9); background: #222; }

        /* ГЛАВНЫЙ ЭКРАН */
        #main-app { display: none; flex-direction: column; padding: 25px; height: 100vh; animation: fade 0.4s ease; }
        @keyframes fade { from { opacity: 0; } to { opacity: 1; } }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .logo { font-weight: 800; font-size: 1.2rem; letter-spacing: -0.5px; }

        /* КАРТОЧКА */
        .main-card { 
            background: var(--card); padding: 30px; border-radius: 30px; 
            border: 1px solid var(--border); margin-bottom: 25px;
            position: relative; overflow: hidden;
        }
        .bal-lbl { font-size: 0.75rem; opacity: 0.4; text-transform: uppercase; font-weight: 800; margin-bottom: 10px; }
        .bal-val { font-size: 2.5rem; font-weight: 800; color: white; }

        /* КНОПКИ */
        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
        .btn { 
            background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid var(--border);
            text-align: center; cursor: pointer; transition: 0.2s;
        }
        .btn:active { transform: scale(0.95); }
        .btn.primary { background: var(--accent); color: black; border: none; font-weight: 800; }
        .btn span { font-size: 0.8rem; font-weight: 800; text-transform: uppercase; }

        /* ИСТОРИЯ */
        .section-title { font-size: 0.8rem; font-weight: 800; opacity: 0.3; margin-bottom: 15px; }
        .his-list { flex: 1; overflow-y: auto; scrollbar-width: none; }
        .his-item { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 0; border-bottom: 1px solid var(--border);
        }

        /* МОДАЛКА */
        .modal { 
            display: none; position: fixed; inset: 0; z-index: 2000; background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px); align-items: center; justify-content: center; padding: 20px;
        }
        .modal-box { width: 100%; max-width: 350px; background: var(--card); padding: 30px; border-radius: 30px; border: 1px solid var(--border); }
        .input { 
            width: 100%; background: #000; border: 1px solid var(--border); padding: 15px; 
            border-radius: 15px; color: #fff; margin: 15px 0; font-size: 1.1rem; text-align: center;
        }
    </style>
</head>
<body>

    <div id="pin-screen">
        <div class="logo" style="margin-bottom: 50px;">UNIONMAS</div>
        <div class="pin-dots">
            <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
        </div>
        <div class="keypad">
            <div class="key" onclick="tap(1)">1</div><div class="key" onclick="tap(2)">2</div><div class="key" onclick="tap(3)">3</div>
            <div class="key" onclick="tap(4)">4</div><div class="key" onclick="tap(5)">5</div><div class="key" onclick="tap(6)">6</div>
            <div class="key" onclick="tap(7)">7</div><div class="key" onclick="tap(8)">8</div><div class="key" onclick="tap(9)">9</div>
            <div></div><div class="key" onclick="tap(0)">0</div><div class="key" onclick="clr()">✕</div>
        </div>
    </div>

    <div id="main-app">
        <div class="header">
            <div class="logo">UNIONMAS.</div>
            <div style="font-size: 0.7rem; opacity: 0.4;">ОНЛАЙН</div>
        </div>

        <div class="main-card">
            <p class="bal-lbl">Ваш баланс</p>
            <p class="bal-val" id="balance">0 ₽</p>
        </div>

        <div class="btn-row">
            <div class="btn primary" onclick="showModal('topup')"><span>Пополнить</span></div>
            <div class="btn" onclick="showModal('send')"><span>Перевести</span></div>
        </div>

        <p class="section-title">ПОСЛЕДНИЕ ОПЕРАЦИИ</p>
        <div class="his-list" id="history"></div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-box">
            <h3 id="m-title" style="text-align:center">Сумма</h3>
            <input type="number" id="m-input" class="input" placeholder="0" inputmode="decimal">
            <button class="btn primary" style="width:100%" onclick="confirmAction()">Подтвердить</button>
            <button class="btn" style="width:100%; border:none; margin-top:10px" onclick="hideModal()">Отмена</button>
        </div>
    </div>

    <script>
        let pin = "";
        // Баланс на нуле при первом запуске
        let balance = parseFloat(localStorage.getItem('um_rub_bal')) || 0;
        let history = JSON.parse(localStorage.getItem('um_rub_his')) || [];
        let currentMode = "";

        // ПИН-КОД (2807)
        function tap(n) {
            if(pin.length < 4) {
                pin += n;
                const dots = document.querySelectorAll('.pin-dot');
                dots[pin.length - 1].classList.add('active');
                if(pin.length === 4) {
                    if(pin === "2807") {
                        document.getElementById('pin-screen').style.display = 'none';
                        document.getElementById('main-app').style.display = 'flex';
                        render();
                    } else {
                        setTimeout(clr, 300);
                    }
                }
            }
        }
        function clr() {
            pin = "";
            document.querySelectorAll('.pin-dot').forEach(d => d.classList.remove('active'));
        }

        // МОДАЛКИ
        function showModal(mode) {
            currentMode = mode;
            document.getElementById('m-title').innerText = mode === 'topup' ? 'Пополнение' : 'Перевод';
            document.getElementById('modal').style.display = 'flex';
            document.getElementById('m-input').value = "";
            document.getElementById('m-input').focus();
        }
        function hideModal() { document.getElementById('modal').style.display = 'none'; }

        function confirmAction() {
            const val = parseFloat(document.getElementById('m-input').value);
            if(!val || val <= 0) return;

            if(currentMode === 'topup') {
                balance += val;
                history.unshift({t: 'Пополнение', a: '+' + val, c: '#00ff88'});
            } else {
                if(val > balance) return alert('Недостаточно средств');
                balance -= val;
                history.unshift({t: 'Перевод', a: '-' + val, c: '#d4af37'});
            }
            hideModal();
            render();
        }

        function render() {
            document.getElementById('balance').innerText = balance.toLocaleString() + ' ₽';
            document.getElementById('history').innerHTML = history.map(h => `
                <div class="his-item">
                    <span>${h.t}</span>
                    <span style="color:${h.c}; font-weight:800">${h.a} ₽</span>
                </div>
            `).join('') || '<p style="text-align:center; opacity:0.2; margin-top:20px">Операций еще нет</p>';
            
            localStorage.setItem('um_rub_bal', balance);
            localStorage.setItem('um_rub_his', JSON.stringify(history));
        }
    </script>
</body>
</html>
