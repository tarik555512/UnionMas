<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UnionMas | Neo-Bank</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Plus+Jakarta+Sans:wght@300;500;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --accent: #00f2ff;
            --accent-glow: rgba(0, 242, 255, 0.4);
            --card-grad: linear-gradient(135deg, #00f2ff 0%, #0066ff 100%);
            --surface: #121212;
            --border: rgba(255, 255, 255, 0.08);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); 
            color: white; 
            overflow: hidden; 
            height: 100vh;
        }

        /* Анимированный фон */
        .bg-glow {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(circle at 50% 50%, #1a1a2e, #050505);
        }
        .orb {
            position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.2;
            animation: float 20s infinite alternate;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(100px, 50px) scale(1.2); }
        }

        /* PIN SCREEN */
        #pin-screen {
            position: fixed; inset: 0; z-index: 9999; background: var(--bg);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .pin-display { display: flex; gap: 20px; margin-bottom: 40px; }
        .pin-dot { 
            width: 16px; height: 16px; border: 2px solid var(--border); border-radius: 50%; 
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .pin-dot.active { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 15px var(--accent); transform: scale(1.2); }

        /* MAIN LAYOUT */
        #main-app { display: none; padding: 20px; height: 100vh; flex-direction: column; animation: appAppear 0.8s ease; }
        @keyframes appAppear { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* CARD DESIGN */
        .card {
            background: var(--card-grad);
            padding: 30px; border-radius: 35px; margin-top: 10px;
            box-shadow: 0 20px 40px rgba(0, 242, 255, 0.15);
            position: relative; overflow: hidden;
            transition: 0.3s;
        }
        .card::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.2), transparent);
            transform: translateX(-100%); animation: shine 5s infinite;
        }
        @keyframes shine { 100% { transform: translateX(100%); } }

        .balance-label { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; opacity: 0.8; color: black; }
        .balance-val { font-family: 'Orbitron', sans-serif; font-size: 2.2rem; font-weight: 700; color: black; margin: 10px 0; }

        /* ACTION BUTTONS */
        .quick-actions { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin: 25px 0; }
        .act-btn { 
            background: var(--surface); border: 1px solid var(--border); 
            padding: 20px 10px; border-radius: 24px; text-align: center;
            transition: 0.2s; cursor: pointer;
        }
        .act-btn:active { transform: scale(0.9); background: var(--border); }
        .act-btn i { display: block; font-size: 1.2rem; margin-bottom: 8px; }
        .act-btn span { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; }

        /* LISTS */
        .scroll-list { display: flex; gap: 15px; overflow-x: auto; padding: 10px 0; scrollbar-width: none; }
        .item-circle { 
            min-width: 70px; display: flex; flex-direction: column; align-items: center; gap: 8px; 
            animation: slideIn 0.5s ease backwards;
        }
        .avatar { width: 60px; height: 60px; border-radius: 22px; background: var(--surface); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 1.2rem; }

        /* MODALS */
        .modal { 
            display: none; position: fixed; inset: 0; z-index: 10000; 
            background: rgba(0,0,0,0.8); backdrop-filter: blur(20px);
            padding: 20px; flex-direction: column; justify-content: flex-end;
        }
        .modal-sheet { 
            background: var(--surface); border-radius: 40px 40px 0 0; 
            padding: 30px; width: 100%; max-width: 500px; margin: 0 auto;
            transform: translateY(100%); animation: sheetUp 0.4s cubic-bezier(0.17, 0.84, 0.44, 1) forwards;
        }
        @keyframes sheetUp { to { transform: translateY(0); } }

        .input-neo {
            width: 100%; background: #1a1a1a; border: 1px solid var(--border);
            padding: 20px; border-radius: 20px; color: white; font-size: 1.1rem;
            margin-bottom: 15px; transition: 0.3s;
        }
        .input-neo:focus { border-color: var(--accent); box-shadow: 0 0 15px var(--accent-glow); }

        .btn-confirm { 
            width: 100%; background: var(--accent); color: black; border: none;
            padding: 20px; border-radius: 20px; font-weight: 800; font-size: 1rem;
        }

        .history-item {
            background: rgba(255,255,255,0.03); padding: 18px; border-radius: 22px;
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;
        }
    </style>
</head>
<body>

    <div class="bg-glow">
        <div class="orb" style="width:300px; height:300px; background:var(--accent); top:10%; left:-10%;"></div>
        <div class="orb" style="width:250px; height:250px; background:#6366f1; bottom:20%; right:-10%; animation-delay:-5s;"></div>
    </div>

    <div id="pin-screen">
        <div style="font-family: 'Orbitron'; letter-spacing: 8px; margin-bottom: 50px; font-size: 1.5rem;">UNIONMAS</div>
        <div class="pin-display">
            <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
        </div>
        <div style="display: grid; grid-template-columns: repeat(3, 80px); gap: 20px;">
            <div onclick="press(1)" class="avatar">1</div><div onclick="press(2)" class="avatar">2</div><div onclick="press(3)" class="avatar">3</div>
            <div onclick="press(4)" class="avatar">4</div><div onclick="press(5)" class="avatar">5</div><div onclick="press(6)" class="avatar">6</div>
            <div onclick="press(7)" class="avatar">7</div><div onclick="press(8)" class="avatar">8</div><div onclick="press(9)" class="avatar">9</div>
            <div></div><div onclick="press(0)" class="avatar">0</div><div onclick="clr()" class="avatar" style="font-size: 0.8rem;">✕</div>
        </div>
    </div>

    <div id="main-app">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <span style="font-weight: 800; font-size: 1.2rem;">Hello, User</span>
            <div class="avatar" style="width:45px; height:45px; cursor:pointer;" onclick="openModal('settings-modal')">⚙</div>
        </div>

        <div class="card" id="bal-card">
            <div class="balance-label" id="lbl-bal">Current Balance</div>
            <div class="balance-val" id="balance">0 ₽</div>
            <div style="font-size: 0.6rem; color: black; font-weight: 700; letter-spacing: 1px;" id="lbl-status">SYSTEM ONLINE</div>
        </div>

        <div class="quick-actions">
            <div class="act-btn" onclick="actionFlow('topup')"><span id="btn-top">Top Up</span></div>
            <div class="act-btn" onclick="openModal('conv-modal')"><span id="btn-conv">Rates</span></div>
            <div class="act-btn" onclick="openModal('history-modal')"><span id="btn-his">History</span></div>
        </div>

        <div style="margin-top: 20px;">
            <div style="display: flex; justify-content: space-between; font-weight: 800; font-size: 0.8rem; margin-bottom: 15px;">
                <span id="lbl-con">CONTACTS</span>
                <span style="color:var(--accent)" onclick="actionFlow('add_contact')">+ ADD</span>
            </div>
            <div class="scroll-list" id="contacts-list"></div>
        </div>

        <div style="margin-top: 30px;">
            <div style="display: flex; justify-content: space-between; font-weight: 800; font-size: 0.8rem; margin-bottom: 15px;">
                <span id="lbl-cor">COMPANIES</span>
                <span style="color:var(--accent)" onclick="actionFlow('add_company')">+ ADD</span>
            </div>
            <div class="scroll-list" id="companies-list"></div>
        </div>
    </div>

    <div id="settings-modal" class="modal" onclick="if(event.target==this) closeModals()">
        <div class="modal-sheet">
            <h2 id="set-title" style="margin-bottom:25px">Settings</h2>
            <div style="margin-bottom:20px">
                <p id="lbl-lang" style="font-size:0.7rem; opacity:0.5; margin-bottom:10px">LANGUAGE</p>
                <div style="display:flex; gap:10px">
                    <button class="act-btn" style="flex:1" onclick="setLang('RUS')">РУССКИЙ</button>
                    <button class="act-btn" style="flex:1" onclick="setLang('ENG')">ENGLISH</button>
                </div>
            </div>
            <div style="margin-bottom:30px">
                <p id="lbl-cur" style="font-size:0.7rem; opacity:0.5; margin-bottom:10px">CURRENCY</p>
                <div style="display:flex; gap:10px">
                    <button class="act-btn" style="flex:1" onclick="setCurr('₽')">RUB</button>
                    <button class="act-btn" style="flex:1" onclick="setCurr('₸')">KZT</button>
                    <button class="act-btn" style="flex:1" onclick="setCurr('$')">USD</button>
                </div>
            </div>
            <button class="btn-confirm" onclick="closeModals()">SAVE</button>
        </div>
    </div>

    <div id="history-modal" class="modal" onclick="if(event.target==this) closeModals()">
        <div class="modal-sheet" style="height: 80vh;">
            <h2 id="his-title" style="margin-bottom:20px">History</h2>
            <div id="history-list" style="overflow-y:auto; height: calc(100% - 100px); scrollbar-width:none;"></div>
        </div>
    </div>

    <div id="conv-modal" class="modal" onclick="if(event.target==this) closeModals()">
        <div class="modal-sheet">
            <h2 id="conv-title" style="margin-bottom:20px">Converter</h2>
            <div id="conv-list"></div>
            <button class="btn-confirm" style="margin-top:20px" onclick="closeModals()">CLOSE</button>
        </div>
    </div>

    <div id="prompt-modal" class="modal">
        <div class="modal-sheet">
            <h2 id="prompt-title" style="margin-bottom:20px">Input</h2>
            <input type="text" id="in-1" class="input-neo" spellcheck="false">
            <input type="number" id="in-2" class="input-neo" inputmode="decimal">
            <button id="btn-ok" class="btn-confirm">CONFIRM</button>
            <button onclick="closeModals()" style="width:100%; background:none; border:none; color:white; margin-top:15px; opacity:0.5;">CANCEL</button>
        </div>
    </div>

    <script>
        let pin = "";
        let balance = parseFloat(localStorage.getItem('um_bal')) || 0;
        let history = JSON.parse(localStorage.getItem('um_his')) || [];
        let contacts = JSON.parse(localStorage.getItem('um_con')) || [{name:"Maria"}];
        let companies = JSON.parse(localStorage.getItem('um_com')) || [{name:"UnionMas"}];
        let lang = localStorage.getItem('um_lang') || 'RUS';
        let currency = localStorage.getItem('um_curr') || '₽';

        const t = {
            RUS: { bal:"ТЕКУЩИЙ БАЛАНС", top:"ПОПОЛНИТЬ", conv:"КУРСЫ", his:"ИСТОРИЯ", con:"КОНТАКТЫ", cor:"КОМПАНИИ", set:"НАСТРОЙКИ", lang:"ЯЗЫК", cur:"ВАЛЮТА", close:"ЗАКРЫТЬ", ok:"ПОДТВЕРДИТЬ", name:"Имя", amt:"Сумма", del:"Удалить?", low:"НИЗКИЙ БАЛАНС" },
            ENG: { bal:"CURRENT BALANCE", top:"TOP UP", conv:"RATES", his:"HISTORY", con:"CONTACTS", cor:"CORPORATIONS", set:"SETTINGS", lang:"LANGUAGE", cur:"CURRENCY", close:"CLOSE", ok:"CONFIRM", name:"Name", amt:"Amount", del:"Delete?", low:"LOW BALANCE" }
        };

        function press(n) {
            if(pin.length < 4) {
                pin += n; document.querySelectorAll('.pin-dot')[pin.length-1].classList.add('active');
                if(pin.length === 4) {
                    if(pin === "2807") { document.getElementById('pin-screen').style.display='none'; document.getElementById('main-app').style.display='flex'; render(); }
                    else { setTimeout(clr, 300); }
                }
            }
        }
        function clr() { pin = ""; document.querySelectorAll('.pin-dot').forEach(d => d.classList.remove('active')); }

        function openModal(id) { 
            if(id === 'conv-modal') updateConv();
            if(id === 'history-modal') updateHistory();
            document.getElementById(id).style.display = 'flex'; 
        }
        function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }

        function actionFlow(type, extra = null) {
            const curT = t[lang];
            openModal('prompt-modal');
            const in1 = document.getElementById('in-1');
            const in2 = document.getElementById('in-2');
            in1.value = ""; in2.value = ""; in1.style.display = 'block'; in2.style.display = 'block';
            in1.placeholder = curT.name; in2.placeholder = curT.amt;

            if(type === 'pay') { in1.value = extra.name; in1.style.display = 'none'; in2.focus(); }
            if(type.includes('add')) in2.style.display = 'none';

            document.getElementById('btn-ok').onclick = () => {
                const name = in1.value; const amt = parseFloat(in2.value);
                if(type.includes('add')) {
                    if(name) { if(type === 'add_contact') contacts.push({name: name}); else companies.push({name: name}); }
                } else {
                    if(!amt) return;
                    if(type === 'topup') { balance += amt; history.unshift({n: (lang==='RUS'?'От: ':'From: ')+name, a: amt, s: "+"}); }
                    else {
                        if(amt > balance) return alert(curT.low);
                        balance -= amt; history.unshift({n: name, a: amt, s: "-"});
                    }
                }
                closeModals(); render();
            };
        }

        function updateConv() {
            const seed = new Date().toDateString(); let h = 0; for(let i=0; i<seed.length; i++) h = seed.charCodeAt(i) + ((h<<5)-h);
            const rK = 5.2 + (h%10)/50; const rU = 1/(92 + (h%20)/10);
            const rates = { '₽':{'₸':rK, '$':rU}, '₸':{'₽':1/rK, '$':(1/rK)*rU}, '$':{'₽':1/rU, '₸':(1/rU)*rK} };
            const others = ['₽', '₸', '$'].filter(c => c !== currency);
            document.getElementById('conv-list').innerHTML = others.map(c => `
                <div class="history-item">
                    <span style="font-weight:800; opacity:0.6">${c}</span>
                    <span style="font-family:'Orbitron'; color:var(--accent)">${(balance * rates[currency][c]).toLocaleString()}</span>
                </div>`).join('');
        }

        function updateHistory() {
            document.getElementById('history-list').innerHTML = history.map(h => `
                <div class="history-item">
                    <div><p style="font-size:0.8rem; font-weight:800">${h.n}</p><p style="font-size:0.5rem; opacity:0.5">NET TRANSACTION</p></div>
                    <span style="font-family:'Orbitron'; color:${h.s==='+'?'#00ff88':var(--accent)}">${h.s}${h.a.toLocaleString()} ${currency}</span>
                </div>`).join('');
        }

        function setLang(l) { lang = l; localStorage.setItem('um_lang', l); render(); }
        function setCurr(c) { currency = c; localStorage.setItem('um_curr', c); render(); }

        function render() {
            const curT = t[lang];
            document.getElementById('balance').innerText = balance.toLocaleString() + ' ' + currency;
            document.getElementById('lbl-bal').innerText = curT.bal;
            document.getElementById('btn-top').innerText = curT.top;
            document.getElementById('btn-conv').innerText = curT.conv;
            document.getElementById('btn-his').innerText = curT.his;
            document.getElementById('lbl-con').innerText = curT.con;
            document.getElementById('lbl-cor').innerText = curT.cor;
            document.getElementById('set-title').innerText = curT.set;

            document.getElementById('contacts-list').innerHTML = contacts.map((c, i) => `
                <div class="item-circle" onclick="actionFlow('pay', {name:'${c.name}'})" oncontextmenu="if(confirm('${curT.del}')){contacts.splice(${i},1);render();}return false;">
                    <div class="avatar">${c.name[0]}</div>
                    <span style="font-size:0.6rem; font-weight:800">${c.name}</span>
                </div>`).join('');

            document.getElementById('companies-list').innerHTML = companies.map((c, i) => `
                <div class="item-circle" onclick="actionFlow('pay', {name:'${c.name}'})" oncontextmenu="if(confirm('${curT.del}')){companies.splice(${i},1);render();}return false;">
                    <div class="avatar" style="border-radius:50%">${c.name[0]}</div>
                    <span style="font-size:0.6rem; font-weight:800">${c.name}</span>
                </div>`).join('');

            localStorage.setItem('um_bal', balance);
            localStorage.setItem('um_his', JSON.stringify(history));
            localStorage.setItem('um_con', JSON.stringify(contacts));
            localStorage.setItem('um_com', JSON.stringify(companies));
        }
    </script>
</body>
</html>
