<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UnionMas Bank | Ultimate Live</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.12);
            --accent: #00f2ff;
            --bg: #030712;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; outline: none; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); color: white; overflow: hidden; height: 100vh; }

        .bg-animate { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 0% 0%, #1e1b4b, #030712); }
        .sphere { position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.15; animation: move 20s infinite alternate ease-in-out; }
        @keyframes move { 0% { transform: translate(0, 0); } 100% { transform: translate(80px, 80px); } }

        .aero { background: var(--glass); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); border: 1px solid var(--border); border-radius: 28px; }

        /* ЭКРАН ПИН-КОДА */
        #pin-screen { position: fixed; inset: 0; z-index: 2000; background: var(--bg); display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .pin-dot { width: 12px; height: 12px; border: 2px solid white; border-radius: 50%; margin: 0 10px; transition: 0.3s; }
        .pin-dot.active { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 20px var(--accent); }
        .keypad { display: grid; grid-template-columns: repeat(3, 80px); gap: 15px; margin-top: 50px; }
        .key { width: 80px; height: 80px; border-radius: 50%; border: 1px solid var(--border); background: var(--glass); display: flex; justify-content: center; align-items: center; font-size: 1.6rem; cursor: pointer; }

        /* ГЛАВНОЕ ПРИЛОЖЕНИЕ */
        #main-app { display: none; flex-direction: column; padding: 20px; max-width: 450px; margin: 0 auto; height: 100vh; animation: fadeIn 0.6s ease; overflow-y: auto; scrollbar-width: none; }
        #main-app::-webkit-scrollbar { display: none; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .header { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; }
        .settings-btn { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; cursor: pointer; background: var(--glass); border-radius: 12px; border: 1px solid var(--border); }

        /* КАРТОЧКА БАЛАНСА */
        .balance-card { padding: 30px 25px; margin: 25px 0 15px; position: relative; }
        .balance-val { font-family: 'JetBrains Mono', monospace; font-size: 2.3rem; font-weight: 800; letter-spacing: -2px; margin: 5px 0; }
        
        /* КОНВЕРТАЦИЯ ПОД БАЛАНСОМ */
        .convert-info { display: flex; gap: 10px; margin-bottom: 20px; }
        .mini-val { flex: 1; padding: 10px; font-size: 0.75rem; color: rgba(255,255,255,0.6); font-family: 'JetBrains Mono'; background: rgba(255,255,255,0.03); border-radius: 12px; border: 1px solid var(--border); }

        .btn-topup { background: var(--accent); color: black; border: none; width: 100%; padding: 16px; border-radius: 18px; font-weight: 800; font-size: 0.8rem; text-transform: uppercase; cursor: pointer; transition: 0.2s; }
        .btn-topup:active { transform: scale(0.97); }

        .section-header { display: flex; justify-content: space-between; align-items: center; margin: 25px 5px 12px; font-size: 0.7rem; font-weight: 800; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 1px; }
        .scroll-h { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
        .scroll-h::-webkit-scrollbar { display: none; }

        /* КОНТАКТЫ */
        .pill { min-width: 100px; padding: 20px 10px; text-align: center; cursor: pointer; transition: 0.3s; }
        .avatar { width: 48px; height: 48px; border-radius: 16px; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; font-weight: 800; }

        /* КОРПОРАЦИИ */
        .company-tile { min-width: 150px; padding: 15px; display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .comp-icon { width: 34px; height: 34px; border-radius: 10px; background: rgba(0, 242, 255, 0.1); border: 1px solid var(--accent); display: flex; align-items: center; justify-content: center; font-weight: 800; color: white; font-size: 0.8rem; }

        /* ИСТОРИЯ */
        .history-list { margin-top: 10px; padding-bottom: 40px; }
        .history-card { display: flex; justify-content: space-between; align-items: center; padding: 20px; margin-bottom: 15px; }

        /* МОДАЛКА НАСТРОЕК */
        #settings-modal { display: none; position: fixed; inset: 0; z-index: 3000; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); padding: 20px; flex-direction: column; align-items: center; justify-content: center; }
        .modal-content { width: 100%; max-width: 380px; padding: 25px; text-align: center; }
        .setting-item { margin-bottom: 25px; text-align: left; }
        .setting-label { font-size: 0.65rem; font-weight: 800; opacity: 0.4; margin-bottom: 8px; display: block; }
        
        .toggle-group { display: flex; background: rgba(255,255,255,0.05); border-radius: 12px; padding: 4px; }
        .toggle-btn { flex: 1; padding: 10px; border: none; background: none; color: white; font-weight: 700; border-radius: 8px; cursor: pointer; font-size: 0.7rem; }
        .toggle-btn.active { background: var(--accent); color: black; }

        .btn-danger { background: rgba(255, 77, 77, 0.1); color: #ff4d4d; border: 1px solid rgba(255, 77, 77, 0.2); width: 100%; padding: 15px; border-radius: 12px; font-weight: 700; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="bg-animate"><div class="sphere" style="width: 400px; height: 400px; background: var(--accent); top:-10%; left:-10%;"></div></div>

    <div id="pin-screen">
        <h2 style="font-weight: 800; letter-spacing: 12px; margin-bottom: 40px;">UNIONMAS</h2>
        <div style="display: flex;"><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div></div>
        <div class="keypad">
            <div class="key" onclick="press(1)">1</div><div class="key" onclick="press(2)">2</div><div class="key" onclick="press(3)">3</div>
            <div class="key" onclick="press(4)">4</div><div class="key" onclick="press(5)">5</div><div class="key" onclick="press(6)">6</div>
            <div class="key" onclick="press(7)">7</div><div class="key" onclick="press(8)">8</div><div class="key" onclick="press(9)">9</div>
            <div style="width:80px"></div><div class="key" onclick="press(0)">0</div><div class="key" onclick="clr()">✕</div>
        </div>
    </div>

    <div id="main-app">
        <div class="header">
            <div style="font-weight: 800; letter-spacing: 2px;">UNIONMAS <span style="color:var(--accent); font-size: 0.6rem;">PRO</span></div>
            <div class="settings-btn" onclick="toggleModal(true)">⚙</div>
        </div>

        <div class="balance-card aero">
            <div id="lbl-bal" style="font-size: 0.6rem; opacity: 0.5; font-weight: 800; margin-bottom: 5px;">МОЙ БАЛАНС</div>
            <div class="balance-val" id="balance">0</div>
            
            <div class="convert-info">
                <div id="conv-1" class="mini-val">≈ 0</div>
                <div id="conv-2" class="mini-val">≈ 0</div>
            </div>

            <button id="btn-top" class="btn-topup" onclick="topUp()">ПОПОЛНИТЬ</button>
        </div>

        <div class="section-header"><span id="lbl-con">КОНТАКТЫ</span><span onclick="addContact()" style="color:var(--accent); cursor:pointer">+ ДОБАВИТЬ</span></div>
        <div class="scroll-h" id="contacts-list"></div>

        <div class="section-header"><span id="lbl-cor">КОМПАНИИ</span><span onclick="addCompany()" style="color:var(--accent); cursor:pointer">+ ДОБАВИТЬ</span></div>
        <div class="scroll-h" id="companies-list"></div>

        <div class="section-header"><span id="lbl-his">ИСТОРИЯ ОПЕРАЦИЙ</span></div>
        <div class="history-list" id="history"></div>
    </div>

    <div id="settings-modal">
        <div class="modal-content aero">
            <h3 id="set-title" style="margin-bottom: 25px; font-weight: 800;">SETTINGS</h3>
            <div class="setting-item">
                <span class="setting-label" id="set-lang">Language</span>
                <div class="toggle-group">
                    <button id="lang-ru" class="toggle-btn" onclick="setLang('RUS')">RUS</button>
                    <button id="lang-en" class="toggle-btn" onclick="setLang('ENG')">ENG</button>
                </div>
            </div>
            <div class="setting-item">
                <span class="setting-label" id="set-curr">Main Currency</span>
                <div class="toggle-group">
                    <button id="cur-rub" class="toggle-btn" onclick="setCurr('₽')">₽</button>
                    <button id="cur-kzt" class="toggle-btn" onclick="setCurr('₸')">₸</button>
                    <button id="cur-usd" class="toggle-btn" onclick="setCurr('$')">$</button>
                </div>
            </div>
            <button id="btn-clear" class="btn-danger" onclick="clearHistory()">CLEAR HISTORY</button>
            <button style="width:100%; margin-top:20px; color:white; background:none; border:none; cursor:pointer; font-weight:700;" onclick="toggleModal(false)">CLOSE</button>
        </div>
    </div>

    <script>
        let pin = "";
        let balance = parseFloat(localStorage.getItem('um_bal')) || 0;
        let history = JSON.parse(localStorage.getItem('um_his')) || [];
        let contacts = JSON.parse(localStorage.getItem('um_con')) || [
            {name:"Мария", color:"#ff4d94"}, 
            {name:"Алекс", color:"#42f55d"}
        ];
        let companies = JSON.parse(localStorage.getItem('um_com')) || [
            {name:"ЖКХ"}, {name:"Интернет"}, {name:"АЗС Газпром"}
        ];
        let lang = localStorage.getItem('um_lang') || 'RUS';
        let currency = localStorage.getItem('um_curr') || '₽';

        // Генерация курсов (привязана к дате)
        function getDailyRates() {
            const seed = new Date().toDateString();
            let hash = 0;
            for (let i = 0; i < seed.length; i++) hash = seed.charCodeAt(i) + ((hash << 5) - hash);
            const rubToKzt = 5.2 + (Math.abs(hash % 10) / 50); 
            const rubToUsd = 1 / (92 + (Math.abs(hash % 20) / 10));
            return {
                '₽': { '₸': rubToKzt, '$': rubToUsd },
                '₸': { '₽': 1/rubToKzt, '$': (1/rubToKzt) * rubToUsd },
                '$': { '₽': 1/rubToUsd, '₸': (1/rubToUsd) * rubToKzt }
            };
        }

        function press(n) {
            if(pin.length < 4) {
                pin += n; document.querySelectorAll('.pin-dot')[pin.length-1].classList.add('active');
                if(pin.length === 4) {
                    if(pin === "2807") { 
                        document.getElementById('pin-screen').style.display = 'none'; 
                        document.getElementById('main-app').style.display = 'flex'; 
                        render(); 
                    } else { alert("WRONG PIN"); clr(); }
                }
            }
        }
        function clr() { pin = ""; document.querySelectorAll('.pin-dot').forEach(d => d.classList.remove('active')); }
        function toggleModal(show) { document.getElementById('settings-modal').style.display = show ? 'flex' : 'none'; }
        function setLang(l) { lang = l; localStorage.setItem('um_lang', l); render(); }
        function setCurr(c) { currency = c; localStorage.setItem('um_curr', c); render(); }
        function clearHistory() { if(confirm("Очистить историю?")) { history = []; render(); } }

        function render() {
            const rates = getDailyRates();
            document.getElementById('balance').innerText = balance.toLocaleString('ru-RU') + ' ' + currency;

            const otherCurrs = ['₽', '₸', '$'].filter(c => c !== currency);
            document.getElementById('conv-1').innerText = `≈ ${(balance * rates[currency][otherCurrs[0]]).toLocaleString('ru-RU', {maximumFractionDigits: 0})} ${otherCurrs[0]}`;
            document.getElementById('conv-2').innerText = `≈ ${(balance * rates[currency][otherCurrs[1]]).toLocaleString('ru-RU', {maximumFractionDigits: 0})} ${otherCurrs[1]}`;

            const t = { 
                RUS: { bal: "МОЙ БАЛАНС", top: "ПОПОЛНИТЬ", con: "КОНТАКТЫ", cor: "КОМПАНИИ", his: "ИСТОРИЯ ОПЕРАЦИЙ", add: "+ ДОБАВИТЬ" }, 
                ENG: { bal: "MY BALANCE", top: "TOP UP", con: "CONTACTS", cor: "COMPANIES", his: "TRANSACTIONS", add: "+ ADD" } 
            }[lang];
            
            document.getElementById('lbl-bal').innerText = t.bal;
            document.getElementById('btn-top').innerText = t.top;
            document.getElementById('lbl-con').innerHTML = `${t.con} <span onclick="addContact()" style="color:var(--accent); cursor:pointer">${t.add}</span>`;
            document.getElementById('lbl-cor').innerHTML = `${t.cor} <span onclick="addCompany()" style="color:var(--accent); cursor:pointer">${t.add}</span>`;
            document.getElementById('lbl-his').innerText = t.his;

            // Активные кнопки в настройках
            document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('lang-' + lang.toLowerCase()).classList.add('active');
            const currMap = {'₽': 'rub', '₸': 'kzt', '$': 'usd'};
            document.getElementById('cur-' + currMap[currency]).classList.add('active');

            // Отрисовка списков
            document.getElementById('contacts-list').innerHTML = contacts.map((c, i) => `
                <div class="aero pill" onclick="pay('${c.name}', 'user')" oncontextmenu="removeEl('con', ${i}); return false;">
                    <div class="avatar" style="background:${c.color || '#4f46e5'}">${c.name[0]}</div>
                    <div style="font-size:0.7rem; font-weight:700;">${c.name}</div>
                </div>`).join('');

            document.getElementById('companies-list').innerHTML = companies.map((c, i) => `
                <div class="aero company-tile" onclick="pay('${c.name}', 'comp')" oncontextmenu="removeEl('com', ${i}); return false;">
                    <div class="comp-icon">${c.name[0]}</div>
                    <div style="font-size:0.7rem; font-weight:700;">${c.name}</div>
                </div>`).join('');

            document.getElementById('history').innerHTML = history.map(h => `
                <div class="history-card aero">
                    <div><div style="font-size:0.85rem; font-weight:700; margin-bottom:4px;">${h.n}</div><div style="font-size:0.6rem; opacity:0.4;">UnionMas Pay</div></div>
                    <div style="font-family:'JetBrains Mono'; font-weight:700; color:${h.s==='+'?'#00f2ff':'#ff4d4d'}">${h.s} ${h.a.toLocaleString()} ${h.curr}</div>
                </div>`).join('');

            localStorage.setItem('um_bal', balance);
            localStorage.setItem('um_his', JSON.stringify(history));
            localStorage.setItem('um_con', JSON.stringify(contacts));
            localStorage.setItem('um_com', JSON.stringify(companies));
        }

        function topUp() {
            let amt = prompt(lang==='RUS'?"Сумма пополнения:":"Amount:");
            if(amt && !isNaN(amt)) {
                let val = parseFloat(amt);
                balance += val;
                history.unshift({n: lang==='RUS'?'Пополнение баланса':'Deposit', a: val, s: "+", curr: currency});
                render();
            }
        }

        function pay(name, type) {
            let amt = prompt(`${lang==='RUS'?'Оплата':'Payment'}: ${name} (${currency})`);
            if(amt && !isNaN(amt)) {
                let v = parseFloat(amt);
                if(v > balance) return alert("Insufficient funds");
                balance -= v;
                history.unshift({n: (lang==='RUS'?'Оплата: ':'Paid: ') + name, a: v, s: "-", curr: currency});
                render();
            }
        }

        function addContact() {
            let n = prompt("Имя контакта:");
            if(n) { contacts.push({name: n, color: '#00f2ff'}); render(); }
        }

        function addCompany() {
            let n = prompt("Название компании:");
            if(n) { companies.push({name: n}); render(); }
        }

        function removeEl(type, i) {
            if(confirm("Удалить?")) {
                if(type === 'con') contacts.splice(i, 1);
                else companies.splice(i, 1);
                render();
            }
        }
    </script>
</body>
</html>
