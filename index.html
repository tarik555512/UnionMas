<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UnionMas Bank | Aero Edition</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.12);
            --border: rgba(255, 255, 255, 0.3);
            --accent: #00f2ff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: #0a0f1d url('https://images.unsplash.com/photo-1620641788421-7a1c342ea42e?q=80&w=1974&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            color: white;
            overflow: hidden;
        }

        /* Экран ПИН-кода */
        #pin-screen {
            position: fixed; inset: 0; z-index: 100;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: 0.5s;
        }

        .pin-dots { display: flex; gap: 20px; margin-bottom: 40px; }
        .dot { width: 16px; height: 16px; border: 2px solid white; border-radius: 50%; }
        .dot.filled { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 15px var(--accent); }

        .keypad { display: grid; grid-template-columns: repeat(3, 80px); gap: 20px; }
        .key {
            width: 80px; height: 80px; border-radius: 50%; background: var(--glass);
            border: 1px solid var(--border); display: flex; justify-content: center; 
            align-items: center; font-size: 1.6rem; cursor: pointer;
        }
        .key:active { background: rgba(255,255,255,0.3); transform: scale(0.9); }

        /* Главный экран */
        #main-screen {
            height: 100%; display: flex; flex-direction: column;
            opacity: 0; transform: translateY(20px); transition: 0.6s;
        }

        header { padding: 40px 20px 20px; text-align: center; font-size: 1.3rem; letter-spacing: 3px; font-weight: 200; }
        .content { flex: 1; padding: 20px; overflow-y: auto; }

        .aero-card {
            background: var(--glass); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border); border-radius: 28px; padding: 25px;
            margin-bottom: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }

        .balance-val { font-size: 2.5rem; font-weight: 800; margin: 10px 0; letter-spacing: -1px; }

        .btn-main {
            width: 100%; padding: 20px; border: none; border-radius: 20px;
            background: rgba(255, 255, 255, 0.15); color: white;
            font-size: 1.1rem; font-weight: 600; cursor: pointer;
            border: 1px solid var(--border); transition: 0.3s;
        }
        .btn-main:active { background: rgba(255,255,255,0.3); transform: scale(0.97); }

        .history-item {
            display: flex; justify-content: space-between; padding: 18px;
            background: rgba(255,255,255,0.05); border-radius: 18px; margin-bottom: 10px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .shake { animation: shake 0.3s; }
        @keyframes shake { 0%, 100% {transform: x(0);} 25% {transform: translateX(-8px);} 75% {transform: translateX(8px);} }
    </style>
</head>
<body>

    <div id="pin-screen">
        <h2 style="font-weight: 300; margin-bottom: 30px;">UnionMas Secure</h2>
        <div class="pin-dots">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
        <div class="keypad">
            <div class="key" onclick="tap(1)">1</div><div class="key" onclick="tap(2)">2</div><div class="key" onclick="tap(3)">3</div>
            <div class="key" onclick="tap(4)">4</div><div class="key" onclick="tap(5)">5</div><div class="key" onclick="tap(6)">6</div>
            <div class="key" onclick="tap(7)">7</div><div class="key" onclick="tap(8)">8</div><div class="key" onclick="tap(9)">9</div>
            <div></div><div class="key" onclick="tap(0)">0</div><div class="key" onclick="cls()">×</div>
        </div>
    </div>

    <div id="main-screen">
        <header>UNIONMAS <span style="font-weight: 700;">BANK</span></header>
        
        <div class="content">
            <div class="aero-card">
                <div style="font-size: 0.8rem; opacity: 0.6;">ТЕКУЩИЙ БАЛАНС</div>
                <div class="balance-val" id="balance">0,00 ₽</div>
                <div style="margin-top: 20px; font-size: 0.9rem; opacity: 0.8; letter-spacing: 2px;">**** 2807</div>
            </div>

            <button class="btn-main" onclick="customTopUp()">Пополнить баланс</button>

            <h3 style="margin: 30px 0 15px 10px; font-weight: 400;">История</h3>
            <div id="history">
                <div style="text-align: center; opacity: 0.4; margin-top: 20px;">Нет недавних операций</div>
            </div>
        </div>
    </div>

    <script>
        let pin = "";
        let balance = 0;

        function tap(n) {
            if (pin.length < 4) {
                pin += n;
                updateDots();
                if (pin.length === 4) check();
            }
        }

        function cls() { pin = ""; updateDots(); }

        function updateDots() {
            const dots = document.querySelectorAll('.dot');
            dots.forEach((d, i) => d.classList.toggle('filled', i < pin.length));
        }

        function check() {
            if (pin === "2807") {
                document.getElementById('pin-screen').style.opacity = "0";
                setTimeout(() => {
                    document.getElementById('pin-screen').style.display = "none";
                    const main = document.getElementById('main-screen');
                    main.style.opacity = "1";
                    main.style.transform = "translateY(0)";
                }, 500);
            } else {
                document.getElementById('pin-screen').classList.add('shake');
                setTimeout(() => {
                    document.getElementById('pin-screen').classList.remove('shake');
                    cls();
                }, 300);
            }
        }

        function customTopUp() {
            let amount = prompt("Введите сумму пополнения (₽):", "1000");
            
            if (amount !== null && !isNaN(amount) && amount > 0) {
                amount = parseFloat(amount);
                balance += amount;
                
                // Обновляем баланс
                document.getElementById('balance').innerText = 
                    balance.toLocaleString('ru-RU', { minimumFractionDigits: 2 }) + ' ₽';
                
                // Обновляем историю
                const history = document.getElementById('history');
                if (history.innerText.includes("Нет недавних")) history.innerHTML = "";
                
                const item = document.createElement('div');
                item.className = 'history-item';
                item.style.backdropFilter = "blur(10px)";
                item.innerHTML = `
                    <div>Пополнение<br><small style="opacity:0.5">Только что</small></div>
                    <div style="color:#00ffcc; font-weight:bold;">+ ${amount.toLocaleString()} ₽</div>
                `;
                history.prepend(item);
            } else if (amount !== null) {
                alert("Пожалуйста, введите корректное число");
            }
        }
    </script>
</body>
</html>
