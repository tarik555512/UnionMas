<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UnionMas | Aero Fix</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.1);
            --accent: #00f2ff;
            --bg: #030712;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; user-select: none; }
        body { font-family: 'Montserrat', sans-serif; background: var(--bg); color: white; height: 100vh; overflow: hidden; }

        /* ЭФФЕКТНЫЙ ФОН */
        .bg-glow { position: fixed; inset: 0; z-index: 1; background: radial-gradient(circle at 50% 50%, #111827, #030712); }
        .orb { position: absolute; width: 300px; height: 300px; background: var(--accent); filter: blur(100px); opacity: 0.2; border-radius: 50%; animation: move 20s infinite alternate; }
        @keyframes move { from { transform: translate(-10%, -10%); } to { transform: translate(100%, 50%); } }

        /* ЭКРАН ПИН-КОДА (САМЫЙ ВЫСОКИЙ ПРИОРИТЕТ) */
        #pin-screen { 
            position: fixed; inset: 0; z-index: 9999; background: rgba(3, 7, 18, 0.9);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
        }

        .logo { font-weight: 800; font-size: 1.8rem; letter-spacing: 5px; margin-bottom: 40px; color: var(--accent); text-shadow: 0 0 20px rgba(0,242,255,0.5); }

        .dots { display: flex; gap: 20px; margin-bottom: 60px; }
        .dot { width: 15px; height: 15px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; transition: 0.3s; }
        .dot.active { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 20px var(--accent); transform: scale(1.3); }

        .numpad { display: grid; grid-template-columns: repeat(3, 85px); gap: 20px; }
        .key { 
            width: 85px; height: 85px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.1);
            background: var(--glass); display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem; font-weight: 600; cursor: pointer; transition: 0.1s;
        }
        .key:active { background: var(--accent); color: #000; transform: scale(0.9); box-shadow: 0 0 30px var(--accent); }

        /* ГЛАВНЫЙ ИНТЕРФЕЙС */
        #app { display: none; position: relative; z-index: 10; padding: 25px; flex-direction: column; height: 100vh; }
        .glass-card { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 30px; padding: 30px; margin-bottom: 20px; }
        .bal-val { font-size: 2.8rem; font-weight: 800; margin-top: 10px; }

        .btn { padding: 20px; border-radius: 20px; border: none; font-weight: 800; text-transform: uppercase; cursor: pointer; transition: 0.2s; text-align: center; margin-bottom: 10px; }
        .btn-main { background: var(--accent); color: #000; box-shadow: 0 10px 20px rgba(0,242,255,0.2); }
        .btn-main:active { transform: scale(0.98); }

        .his-item { display: flex; justify-content: space-between; padding: 15px; background: rgba(255,255,255,0.03); border-radius: 15px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

    <div class="bg-glow"><div class="orb"></div></div>

    <div id="pin-screen">
        <div class="logo">UNIONMAS</div>
        <div class="dots" id="dots-container">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
        <div class="numpad">
            <div class="key" onclick="press(1)">1</div><div class="key" onclick="press(2)">2</div><div class="key" onclick="press(3)">3</div>
            <div class="key" onclick="press(4)">4</div><div class="key" onclick="press(5)">5</div><div class="key" onclick="press(6)">6</div>
            <div class="key" onclick="press(7)">7</div><div class="key" onclick="press(8)">8</div><div class="key" onclick="press(9)">9</div>
            <div style="opacity:0"></div><div class="key" onclick="press(0)">0</div><div class="key" onclick="resetPin()">✕</div>
        </div>
    </div>

    <div id="app">
        <div style="display:flex; justify-content:space-between; margin-bottom:30px">
            <span style="font-weight:800; color:var(--accent)">PREMIUM ACCESS</span>
            <span onclick="location.reload()" style="opacity:0.5">EXIT</span>
        </div>

        <div class="glass-card">
            <p style="font-size:0.8rem; opacity:0.5; text-transform:uppercase; letter-spacing:2px">Текущий баланс</p>
            <div class="bal-val" id="bal-text">0 ₽</div>
        </div>

        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px">
            <div class="btn btn-main" onclick="action('topup')">Ввод</div>
            <div class="btn" style="background:var(--glass); color:white; border:1px solid rgba(255,255,255,0.1)" onclick="action('send')">Вывод</div>
        </div>

        <p style="margin: 30px 0 15px; font-weight:800; font-size:0.8rem; opacity:0.3; letter-spacing:1px">ИСТОРИЯ ТРАНЗАКЦИЙ</p>
        <div id="history-list" style="flex:1; overflow-y:auto;"></div>
    </div>

    <script>
        let currentPin = "";
        let balance = parseFloat(localStorage.getItem('union_bal_final')) || 0;
        let history = JSON.parse(localStorage.getItem('union_his_final')) || [];

        // Функция ввода (2807)
        function press(num) {
            if (currentPin.length < 4) {
                currentPin += num;
                updateDots();
                
                if (currentPin.length === 4) {
                    if (currentPin === "2807") {
                        // Успешный вход
                        document.getElementById('pin-screen').style.opacity = "0";
                        setTimeout(() => {
                            document.getElementById('pin-screen').style.display = "none";
                            document.getElementById('app').style.display = "flex";
                            render();
                        }, 300);
                    } else {
                        // Ошибка - тряска и сброс
                        setTimeout(resetPin, 200);
                    }
                }
            }
        }

        function updateDots() {
            const dots = document.querySelectorAll('.dot');
            dots.forEach((dot, index) => {
                if (index < currentPin.length) dot.classList.add('active');
                else dot.classList.remove('active');
            });
        }

        function resetPin() {
            currentPin = "";
            updateDots();
        }

        // Простая логика баланса
        function action(type) {
            let amount = prompt(type === 'topup' ? "Сумма пополнения:" : "Сумма перевода:");
            amount = parseFloat(amount);
            
            if (isNaN(amount) || amount <= 0) return;

            if (type === 'topup') {
                balance += amount;
                history.unshift({title: 'Пополнение', sum: '+' + amount, color: '#00f2ff'});
            } else {
                if (amount > balance) return alert("Недостаточно средств");
                balance -= amount;
                history.unshift({title: 'Перевод', sum: '-' + amount, color: '#ff4d4d'});
            }
            render();
        }

        function render() {
            document.getElementById('bal-text').innerText = balance.toLocaleString() + ' ₽';
            document.getElementById('history-list').innerHTML = history.map(h => `
                <div class="his-item">
                    <span style="opacity:0.7">${h.title}</span>
                    <span style="color:${h.color}; font-weight:800">${h.sum} ₽</span>
                </div>
            `).join('') || '<p style="text-align:center; opacity:0.2">История пуста</p>';

            localStorage.setItem('union_bal_final', balance);
            localStorage.setItem('union_his_final', JSON.stringify(history));
        }
    </script>
</body>
</html>
