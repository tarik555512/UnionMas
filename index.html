<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UnionMas | Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --card: #111111;
            --accent: #d4af37;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Manrope', sans-serif; background: var(--bg); color: #fff; overflow: hidden; height: 100vh; }

        /* PIN SCREEN */
        #pin-screen { position: fixed; inset: 0; z-index: 1000; background: var(--bg); display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .pin-dot { width: 12px; height: 12px; border: 2px solid var(--border); border-radius: 50%; margin: 0 7px; transition: 0.2s; }
        .pin-dot.active { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 10px var(--accent); }
        .keypad { display: grid; grid-template-columns: repeat(3, 80px); gap: 20px; margin-top: 40px; }
        .key { width: 80px; height: 80px; border-radius: 50%; background: var(--card); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; cursor: pointer; }

        /* APP */
        #app { display: none; flex-direction: column; padding: 25px; height: 100vh; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .settings-btn { font-size: 1.5rem; cursor: pointer; opacity: 0.7; }

        .card { background: var(--card); padding: 30px; border-radius: 30px; border: 1px solid var(--border); margin-bottom: 20px; }
        .bal-val { font-size: 2.4rem; font-weight: 800; margin-top: 5px; }

        .rates-box { font-size: 0.75rem; opacity: 0.5; margin-bottom: 20px; padding: 0 5px; }

        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px; }
        .btn { background: var(--card); padding: 18px; border-radius: 20px; border: 1px solid var(--border); text-align: center; cursor: pointer; font-weight: 700; text-transform: uppercase; font-size: 0.75rem; }
        .btn.primary { background: var(--accent); color: #000; border: none; }

        /* MODAL */
        .modal { display: none; position: fixed; inset: 0; z-index: 2000; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); align-items: center; justify-content: center; padding: 20px; }
        .modal-box { width: 100%; max-width: 360px; background: var(--card); padding: 30px; border-radius: 30px; border: 1px solid var(--border); }
        .input { width: 100%; background: #000; border: 1px solid var(--border); padding: 15px; border-radius: 15px; color: #fff; margin: 15px 0; text-align: center; font-size: 1.2rem; }
        
        .toggle-group { display: flex; gap: 10px; margin-top: 10px; }
        .toggle-btn { flex: 1; padding: 10px; background: #000; border: 1px solid var(--border); color: #fff; border-radius: 10px; cursor: pointer; font-size: 0.7rem; }
        .toggle-btn.active { border-color: var(--accent); color: var(--accent); }

        .his-item { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
    </style>
</head>
<body>

    <div id="pin-screen">
        <div style="font-weight:800; letter-spacing:4px; margin-bottom:40px">UNIONMAS</div>
        <div style="display:flex"><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div></div>
        <div class="keypad">
            <div class="key" onclick="tap(1)">1</div><div class="key" onclick="tap(2)">2</div><div class="key" onclick="tap(3)">3</div>
            <div class="key" onclick="tap(4)">4</div><div class="key" onclick="tap(5)">5</div><div class="key" onclick="tap(6)">6</div>
            <div class="key" onclick="tap(7)">7</div><div class="key" onclick="tap(8)">8</div><div class="key" onclick="tap(9)">9</div>
            <div></div><div class="key" onclick="tap(0)">0</div><div class="key" onclick="clr()">✕</div>
        </div>
    </div>

    <div id="app">
        <div class="header">
            <div style="font-weight:800">UNIONMAS.</div>
            <div class="settings-btn" onclick="showM('settings')">⚙️</div>
        </div>

        <div class="card">
            <p id="lbl-bal" style="font-size:0.7rem; opacity:0.4; text-transform:uppercase">Баланс</p>
            <p class="bal-val" id="balance">0 ₽</p>
        </div>

        <div class="rates-box" id="daily-rates">Загрузка курсов...</div>

        <div class="btn-row">
            <div class="btn primary" id="btn-add" onclick="opAction('topup')">Пополнить</div>
            <div class="btn" id="btn-send" onclick="opAction('send')">Перевести</div>
        </div>

        <p style="font-size:0.7rem; opacity:0.3; margin-bottom:15px; font-weight:800">ИСТОРИЯ</p>
        <div id="history" style="flex:1; overflow-y:auto"></div>
    </div>

    <div id="modal-settings" class="modal">
        <div class="modal-box">
            <h3 id="set-title">Настройки</h3>
            
            <p style="font-size:0.7rem; margin-top:20px; opacity:0.5">ЯЗЫК / LANGUAGE</p>
            <div class="toggle-group">
                <div class="toggle-btn" id="lang-RUS" onclick="setLang('RUS')">РУССКИЙ</div>
                <div class="toggle-btn" id="lang-ENG" onclick="setLang('ENG')">ENGLISH</div>
            </div>

            <p style="font-size:0.7rem; margin-top:20px; opacity:0.5">ВАЛЮТА / CURRENCY</p>
            <div class="toggle-group">
                <div class="toggle-btn" id="cur-RUB" onclick="setCur('RUB')">RUB (₽)</div>
                <div class="toggle-btn" id="cur-USD" onclick="setCur('USD')">USD ($)</div>
                <div class="toggle-btn" id="cur-KZT" onclick="setCur('KZT')">KZT (₸)</div>
            </div>

            <button class="btn primary" style="width:100%; margin-top:30px" onclick="hideM()">ОК</button>
        </div>
    </div>

    <div id="modal-action" class="modal">
        <div class="modal-box">
            <h3 id="act-title">Сумма</h3>
            <input type="number" id="act-input" class="input" placeholder="0">
            <button class="btn primary" style="width:100%" onclick="confirmAct()">Подтвердить</button>
            <button class="btn" style="width:100%; border:none; margin-top:10px" onclick="hideM()">Отмена</button>
        </div>
    </div>

    <script>
        let pin = "";
        let rubBalance = parseFloat(localStorage.getItem('u_bal_v3')) || 0;
        let history = JSON.parse(localStorage.getItem('u_his_v3')) || [];
        let lang = localStorage.getItem('u_lang_v3') || 'RUS';
        let currency = localStorage.getItem('u_cur_v3') || 'RUB';
        let mode = "";

        const i18n = {
            RUS: { bal: "Ваш баланс", add: "Пополнить", send: "Перевести", set: "Настройки", amt: "Сумма", low: "Недостаточно средств" },
            ENG: { bal: "Your Balance", add: "Deposit", send: "Transfer", set: "Settings", amt: "Amount", low: "Insufficient funds" }
        };

        // Генератор курсов (меняется каждый день)
        function getDailyRates() {
            const day = new Date().getDate();
            const month = new Date().getMonth();
            const seed = day + month;
            return {
                USD: 91 + (seed % 5), // от 91 до 96
                KZT: 0.20 + (seed % 10) / 100 // от 0.20 до 0.30
            };
        }

        function tap(n) {
            if(pin.length < 4) {
                pin += n;
                document.querySelectorAll('.pin-dot')[pin.length-1].classList.add('active');
                if(pin.length === 4) {
                    if(pin === "2807") {
                        document.getElementById('pin-screen').style.display = 'none';
                        document.getElementById('app').style.display = 'flex';
                        render();
                    } else { setTimeout(clr, 300); }
                }
            }
        }
        function clr() { pin = ""; document.querySelectorAll('.pin-dot').forEach(d => d.classList.remove('active')); }

        function showM(id) { document.getElementById('modal-'+id).style.display = 'flex'; render(); }
        function hideM() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }

        function opAction(m) { mode = m; document.getElementById('act-title').innerText = i18n[lang].amt; showM('action'); }

        function setLang(l) { lang = l; localStorage.setItem('u_lang_v3', l); render(); }
        function setCur(c) { currency = c; localStorage.setItem('u_cur_v3', c); render(); }

        function confirmAct() {
            const val = parseFloat(document.getElementById('act-input').value);
            if(!val) return;
            
            const rates = getDailyRates();
            let rubVal = val;
            if(currency === 'USD') rubVal = val * rates.USD;
            if(currency === 'KZT') rubVal = val * rates.KZT;

            if(mode === 'topup') {
                rubBalance += rubVal;
                history.unshift({t: lang === 'RUS' ? 'Зачисление' : 'Deposit', a: '+' + val + ' ' + getSym()});
            } else {
                if(rubVal > rubBalance) return alert(i18n[lang].low);
                rubBalance -= rubVal;
                history.unshift({t: lang === 'RUS' ? 'Перевод' : 'Transfer', a: '-' + val + ' ' + getSym()});
            }
            hideM(); render();
        }

        function getSym() { return currency === 'RUB' ? '₽' : (currency === 'USD' ? '$' : '₸'); }

        function render() {
            const rates = getDailyRates();
            const sym = getSym();
            let displayBal = rubBalance;
            if(currency === 'USD') displayBal = rubBalance / rates.USD;
            if(currency === 'KZT') displayBal = rubBalance / rates.KZT;

            document.getElementById('balance').innerText = displayBal.toLocaleString(undefined, {maximumFractionDigits: 2}) + ' ' + sym;
            document.getElementById('daily-rates').innerText = `Курс сегодня: $ = ${rates.USD}₽ | ₸ = ${rates.KZT}₽`;
            
            // Тексты
            const t = i18n[lang];
            document.getElementById('lbl-bal').innerText = t.bal;
            document.getElementById('btn-add').innerText = t.add;
            document.getElementById('btn-send').innerText = t.send;
            document.getElementById('set-title').innerText = t.set;

            // Активные кнопки
            document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('lang-'+lang).classList.add('active');
            document.getElementById('cur-'+currency).classList.add('active');

            document.getElementById('history').innerHTML = history.map(h => `
                <div class="his-item"><span>${h.t}</span><span style="font-weight:800">${h.a}</span></div>
            `).join('') || '...';

            localStorage.setItem('u_bal_v3', rubBalance);
            localStorage.setItem('u_his_v3', JSON.stringify(history));
        }
    </script>
</body>
</html>
